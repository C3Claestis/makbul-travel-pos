name: makbul_app
description: "Aplikasi SaaS untuk perjalanan umroh atau haji"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.3
  google_sign_in: ^6.1.5
  firebase_auth: ^6.3.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.10
  flutter_facebook_auth: ^7.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/svgs/
    - assets/data/
